<!doctype html>
<html lang="en">
  <head>
    <script>
      (function() {
        // Essential shim for environments where fetch is a non-writable getter
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: () => originalFetch,
            set: (v) => { console.warn('Attempted fetch overwrite blocked.'); }
          });
        } catch (e) {
          console.log('Fetch shim applied via fallback.');
        }

        // Comprehensive error logger
        window.addEventListener('error', function(e) {
          var stack = e.error && e.error.stack ? e.error.stack : (e.message || 'Unknown Error');
          console.error('CRITICAL_UI_ERROR:', stack);
        });
        window.addEventListener('unhandledrejection', function(e) {
          var reason = e.reason && e.reason.stack ? e.reason.stack : (e.reason || 'Unhandled Rejection');
          console.error('CRITICAL_PROMISE_REJECTION:', reason);
        });
      })();
    </script>
    <meta charset="UTF-8" />
    <title>Zimbabalooba Fashion Tailor</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
